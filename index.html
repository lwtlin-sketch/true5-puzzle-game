<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>說話真・趣味拼圖</title>
  <!-- 載入 Tailwind CSS (排版工具) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 React (核心套件) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 載入 Babel (讓瀏覽器看懂 React 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 預設圖片檔名 (請確保您上傳的圖片檔名與此完全一致)
    const DEFAULT_IMAGE = './41944854-7577-44e3-a845-ebe3b3c6fa46.jpg';

    function PuzzleGame() {
      const [gridSize, setGridSize] = useState(3);
      const [image, setImage] = useState(DEFAULT_IMAGE);
      const [board, setBoard] = useState([]); 
      const [isPlaying, setIsPlaying] = useState(false);
      const [isFinished, setIsFinished] = useState(false);
      const [time, setTime] = useState(0);
      const [selectedSlot, setSelectedSlot] = useState(null);

      const numPieces = gridSize * gridSize;

      useEffect(() => {
        setBoard(Array.from({ length: numPieces }, (_, i) => i));
      }, [numPieces]);

      useEffect(() => {
        let interval = null;
        if (isPlaying && !isFinished) {
          interval = setInterval(() => {
            setTime((t) => t + 1);
          }, 1000);
        } else {
          clearInterval(interval);
        }
        return () => clearInterval(interval);
      }, [isPlaying, isFinished]);

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const url = URL.createObjectURL(file);
          setImage(url);
          resetGame();
        }
      };

      const shuffleBoard = () => {
        let newBoard = Array.from({ length: numPieces }, (_, i) => i);
        for (let i = newBoard.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newBoard[i], newBoard[j]] = [newBoard[j], newBoard[i]];
        }
        setBoard(newBoard);
      };

      const startGame = () => {
        shuffleBoard();
        setTime(0);
        setIsPlaying(true);
        setIsFinished(false);
        setSelectedSlot(null);
      };

      const resetGame = () => {
        setIsPlaying(false);
        setIsFinished(false);
        setTime(0);
        setSelectedSlot(null);
        setBoard(Array.from({ length: numPieces }, (_, i) => i)); 
      };

      const handleGridSizeChange = (newSize) => {
        setGridSize(newSize);
        setIsPlaying(false);
        setIsFinished(false);
        setTime(0);
        setSelectedSlot(null);
        setBoard(Array.from({ length: newSize * newSize }, (_, i) => i));
      };

      const checkWin = (currentBoard) => {
        const isWin = currentBoard.every((pieceId, index) => pieceId === index);
        if (isWin) {
          setIsPlaying(false);
          setIsFinished(true);
          setSelectedSlot(null);
        }
      };

      const handlePieceClick = (index) => {
        if (!isPlaying || isFinished) return;
        if (selectedSlot === null) {
          setSelectedSlot(index);
        } else {
          if (selectedSlot === index) {
            setSelectedSlot(null);
          } else {
            const newBoard = [...board];
            const temp = newBoard[selectedSlot];
            newBoard[selectedSlot] = newBoard[index];
            newBoard[index] = temp;
            setBoard(newBoard);
            setSelectedSlot(null);
            checkWin(newBoard);
          }
        }
      };

      const getPieceStyle = (pieceId) => {
        if (pieceId === null || pieceId === undefined) return {};
        const row = Math.floor(pieceId / gridSize);
        const col = pieceId % gridSize;
        return {
          backgroundImage: `url(${image})`,
          backgroundSize: `${gridSize * 100}% ${gridSize * 100}%`,
          backgroundPosition: `${col * (100 / (gridSize - 1))}% ${row * (100 / (gridSize - 1))}%`,
        };
      };

      return (
        <div className="min-h-screen bg-orange-50 font-sans text-gray-800 p-4 flex flex-col items-center">
          <div className="text-center mb-6 mt-4">
            <h1 className="text-4xl font-extrabold text-orange-600 tracking-wider flex items-center justify-center gap-3 drop-shadow-sm">
              🧩 說話真・趣味拼圖
            </h1>
            <p className="text-orange-500 mt-2 font-medium">點擊兩塊拼圖來交換位置，拼出完整的圖案吧！</p>
          </div>

          <div className="bg-white p-4 rounded-2xl shadow-md w-full max-w-4xl flex flex-wrap gap-4 items-center justify-between mb-8">
            <div className="flex items-center gap-4">
              <div className="flex items-center gap-2 bg-orange-100 text-orange-700 px-4 py-2 rounded-full font-bold text-lg">
                ⏱️ {formatTime(time)}
              </div>
              {isFinished && (
                <span className="text-green-500 font-bold flex items-center gap-1 animate-bounce">
                  ✅ 過關了！
                </span>
              )}
            </div>

            <div className="flex items-center gap-2 bg-gray-50 p-1.5 rounded-xl border border-gray-100">
              <span className="text-sm font-bold text-gray-500 ml-2 mr-1">🔲 難度:</span>
              {[3, 4, 5].map((size) => (
                <button
                  key={size}
                  onClick={() => handleGridSizeChange(size)}
                  disabled={isPlaying && !isFinished}
                  className={`px-3 py-1.5 rounded-lg font-bold text-sm transition-all ${
                    gridSize === size 
                      ? 'bg-orange-500 text-white shadow-md transform scale-105' 
                      : 'text-gray-500 hover:bg-gray-200'
                  } ${isPlaying && !isFinished ? 'opacity-50 cursor-not-allowed' : ''}`}
                >
                  {size}x{size}
                </button>
              ))}
            </div>

            <div className="flex items-center gap-3">
              <label className="cursor-pointer bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-2 rounded-full font-bold flex items-center gap-2 transition-colors">
                🖼️ 上傳圖片
                <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
              </label>

              {!isPlaying && !isFinished ? (
                <button onClick={startGame} className="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded-full font-bold flex items-center gap-2 shadow-sm">
                  ▶️ 開始遊戲
                </button>
              ) : (
                <button onClick={resetGame} className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-full font-bold flex items-center gap-2">
                  🔄 重新開始
                </button>
              )}
            </div>
          </div>

          <div className="flex flex-col md:flex-row gap-8 items-start justify-center w-full max-w-5xl">
            <div className="relative bg-white p-3 rounded-2xl shadow-xl border-4 border-orange-200 mx-auto w-full max-w-lg aspect-square">
              {!isPlaying && !isFinished && (
                <div className="absolute inset-0 z-20 bg-black/40 rounded-xl flex items-center justify-center backdrop-blur-[2px]">
                  <button onClick={startGame} className="bg-white text-orange-600 text-2xl font-bold py-4 px-8 rounded-full shadow-2xl hover:scale-105 transition-transform">
                    點擊開始
                  </button>
                </div>
              )}

              <div className="w-full h-full grid gap-1" style={{ gridTemplateColumns: `repeat(${gridSize}, minmax(0, 1fr))`, gridTemplateRows: `repeat(${gridSize}, minmax(0, 1fr))` }}>
                {board.map((pieceId, index) => (
                  <div
                    key={index}
                    onClick={() => handlePieceClick(index)}
                    className={`relative w-full h-full rounded-md shadow-sm transition-all duration-200 cursor-pointer ${isPlaying ? 'hover:brightness-110' : ''} ${selectedSlot === index ? 'ring-4 ring-orange-500 scale-[0.92] z-10 shadow-lg' : ''} ${isFinished ? 'gap-0 rounded-none' : ''}`}
                    style={getPieceStyle(pieceId)}
                  ></div>
                ))}
              </div>

              {isFinished && (
                <div className="absolute inset-0 z-30 flex flex-col items-center justify-center bg-white/95 rounded-xl backdrop-blur-sm p-6 text-center">
                  <div className="text-6xl mb-4 animate-bounce">🏆</div>
                  <h2 className="text-3xl font-black text-orange-600 mb-2 drop-shadow-md">太棒了！拼圖完成！</h2>
                  <p className="text-lg font-bold text-gray-700 mb-4">
                    完成時間：<span className="text-orange-500">{formatTime(time)}</span>
                  </p>
                  
                  <div className="bg-orange-50 p-4 rounded-xl mb-6 border-2 border-orange-200 shadow-inner max-w-sm">
                    <p className="text-orange-800 font-bold leading-relaxed text-sm md:text-base">
                      記得喔！做個<span className="text-orange-600">「說話真」</span>的乖小孩，誠實不虛假。
                      <br />只要我們順從良心說實話，可怕的<span className="text-orange-600">「謊話蟲」</span>就不會跑出來搗蛋囉！
                    </p>
                  </div>

                  <button onClick={startGame} className="bg-gradient-to-r from-orange-400 to-orange-500 hover:from-orange-500 hover:to-orange-600 text-white text-lg font-bold py-3 px-8 rounded-full shadow-lg transition-transform hover:scale-105">
                    再玩一次
                  </button>
                </div>
              )}
            </div>

            <div className="bg-white p-4 rounded-2xl shadow-md w-full max-w-[250px] mx-auto md:mx-0 flex flex-col items-center">
              <h3 className="text-lg font-bold text-gray-600 mb-3 w-full text-center border-b pb-2">參考原圖</h3>
              <div className="w-full aspect-square rounded-xl overflow-hidden border-2 border-gray-100 shadow-inner">
                <img src={image} alt="原圖參考" className="w-full h-full max-w-full max-h-full object-contain text-xs text-gray-400 flex items-center justify-center" />
              </div>
              <p className="text-sm text-gray-400 mt-4 text-center">提示：先點擊一塊拼圖，再點擊另一塊即可交換。</p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PuzzleGame />);
  </script>
</body>
</html>
